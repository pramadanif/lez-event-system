name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  # CRITICAL: Never use RISC0_DEV_MODE=1 in CI
  RISC0_DEV_MODE: "0"

jobs:
  build-and-test:
    name: Build, Clippy, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cargo build (all workspace crates)
        run: cargo build --workspace

      - name: Cargo clippy (zero warnings)
        run: cargo clippy --workspace -- -D warnings

      - name: Cargo test (all workspace crates)
        run: cargo test --workspace

      - name: Verify lez-event-cli binary builds
        run: cargo build --bin lez-event-cli

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
