name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  # CRITICAL: Never use RISC0_DEV_MODE=1 in CI
  RISC0_DEV_MODE: "0"
  RUST_BACKTRACE: "1"
  RUST_LOG: "info"

jobs:
  lint-and-build:
    name: Lint and Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get install -y build-essential clang libclang-dev libssl-dev pkg-config

      - name: Install Rust toolchain (respects rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.0"
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (zero warnings — matches LEZ deny policy)
        run: cargo clippy --workspace --tests -- -D warnings

      - name: Build all crates
        run: cargo build --workspace

  unit-tests:
    name: Unit Tests (RISC0_DEV_MODE=0)
    runs-on: ubuntu-latest
    needs: lint-and-build
    env:
      RISC0_DEV_MODE: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.94.0
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.0"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run unit and integration tests (RISC0_DEV_MODE=0)
        run: cargo test --workspace
        env:
          RISC0_DEV_MODE: "0"

      - name: Verify lez-event-cli binary
        run: cargo build --bin lez-event-cli

  integration-tests:
    name: Integration Tests (LEZ sequencer)
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      RISC0_DEV_MODE: "0"
    steps:
      - name: Checkout lez-event-system
        uses: actions/checkout@v4

      - name: Checkout LEZ repository
        uses: actions/checkout@v4
        with:
          repository: logos-blockchain/logos-execution-zone
          path: logos-execution-zone

      - name: Install Rust 1.94.0
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.0"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lez-${{ hashFiles('**/Cargo.lock') }}

      - name: Run integration tests (RISC0_DEV_MODE=0)
        run: ./scripts/run-integration-tests.sh
        env:
          RISC0_DEV_MODE: "0"
          LEZ_DIR: ${{ github.workspace }}/logos-execution-zone
